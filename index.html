<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Estudo Bíblico</title>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  
  <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Estudo Bíblico</h1>

<div class="container">
  <div id="tree"></div>
  <div id="timeline"></div>
</div>

<label>Foco na pessoa:</label>
<select id="rootPerson" onchange="render()"></select>


<h2>Personagens</h2>
<div class="form">
  <input id="name" placeholder="Nome">
  <input id="birth" placeholder="Nascimento">
  <input id="death" placeholder="Morte">
  <label><input type="checkbox" id="approx"> Aproximado</label>
  <button onclick="addPerson()">Salvar</button>
</div>

<ul id="peopleList"></ul>

<h2>Famílias</h2>
<div class="form">
  <label>Marido:</label>
  <select id="husband"></select>

  <label>Esposa:</label>
  <select id="wife"></select>

  <input id="start" placeholder="Início (opcional)">
  <input id="end" placeholder="Fim (opcional)">

  <div id="childrenContainer"></div>
  <button onclick="addChildField()">+ Filho</button>

  <br><br>
  <button onclick="addFamily()">Salvar Família</button>
</div>

<ul id="familyList"></ul>

<h2>Acontecimentos</h2>
<div class="form">
  <input id="eventTitle" placeholder="Título">
  <input id="eventYear" placeholder="Ano">
  <input id="eventEnd" placeholder="Ano fim">
  <label><input type="checkbox" id="eventApprox"> Aproximado</label>

  <select id="eventPerson"></select>
  <button onclick="addEvent()">Adicionar</button>
</div>

<ul id="eventList"></ul>

<script src="script.js"></script>
</body>
</html>
